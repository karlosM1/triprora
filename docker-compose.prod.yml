# Production-oriented compose: multi-stage builds, non-root backend, nginx-served
# frontend. Secrets come from the environment / an .env file placed next to this
# file — never bake real credentials into the images.
#
#   docker compose -f docker-compose.prod.yml up --build -d
#
# Required environment variables (see backend/.env.example and frontend/.env.example):
#   DATABASE_URL, DIRECT_URL, SUPABASE_URL, SUPABASE_ANON_KEY,
#   SUPABASE_SERVICE_ROLE_KEY, SUPERADMIN_EMAIL, ADMIN_EMAIL, CORS_ORIGINS,
#   VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-600}
      SENSITIVE_RATE_LIMIT_MAX: ${SENSITIVE_RATE_LIMIT_MAX:-30}
      AUTH_CACHE_TTL_MS: ${AUTH_CACHE_TTL_MS:-30000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(\"http://127.0.0.1:3001/api/health\").then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
      args:
        VITE_API_URL: /api
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      backend:
        condition: service_started
